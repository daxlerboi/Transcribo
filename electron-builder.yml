appId: com.transcribo.app
productName: Transcribo
copyright: "Copyright © 2024 Transcribo"
directories:
  output: dist-electron
  buildResources: build
  app: .
icon: build/icon.png
files:
  - "electron/**/*"
  - "package.json"
extraResources:
  - from: "video-transcriber-frontend/dist"
    to: "frontend"
    filter:
      - "**/*"
  - from: "backend"
    to: "backend"
    filter:
      - "**/*"
      - "!__pycache__"
      - "!.env"
win:
  target:
    - nsis
  sign: false
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: false
  createStartMenuShortcut: false
  include: null
portable:
  artifactName: "${productName}-${version}-portable.${ext}"
mac:
  target:
    - dmg
  sign: false
linux:
  target:
    - AppImage
