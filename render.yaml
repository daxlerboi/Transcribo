services:
  - type: web
    name: transcribo
    env: python
    buildCommand: cd video-transcriber-frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 600
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ORIGINS
        value: https://transcribo.onrender.com
